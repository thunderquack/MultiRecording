# Recording settings
RATE="48000"
FORMAT="S16_LE"
CHANNELS="1"

# Where sessions are stored
OUT_DIR="$PROJECT_DIR/recordings"

# Only capture devices whose combined card/device description from arecord -l
# matches this regex are used.
# Set to "" or ".*" to use all detected capture devices.
# Example below matches typical USB PnP microphones and USB audio adapters.
DEVICE_REGEX="USB|Audio|Device|Mic|Microphone|PnP"

# If 1, ./recordctl stop will also try to create session_*/multitrack.wav
# Requires ffmpeg. For separate USB cards, separate WAVs are safer; merge later if needed.
AUTO_MERGE="0"
