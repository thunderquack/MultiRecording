# Recording settings
RATE="48000"
FORMAT="S16_LE"
CHANNELS="1"

# Where sessions are stored
OUT_DIR="$PROJECT_DIR/recordings"

# Only devices whose arecord -l line matches this regex are used.
# For your current Raspberry Pi output, this matches both USB PnP Sound Device cards.
DEVICE_REGEX="USB|Audio|Device|Mic|Microphone|PnP"

# If 1, ./recordctl stop will also try to create session_*/multitrack.wav
# Requires ffmpeg. For separate USB cards, separate WAVs are safer; merge later if needed.
AUTO_MERGE="0"
